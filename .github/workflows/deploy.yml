name: Deploy Godot Web

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: godot-web-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, godot, proxmox]

    env:
      GODOT: /usr/local/bin/godot
      WORKSPACE: /var/lib/godot/workspace
      RELEASES: /var/www/godot/releases
      CURRENT: /var/www/godot/current

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$WORKSPACE"
          mkdir -p "$WORKSPACE"

          rsync -a \
            --delete \
            --exclude ".git" \
            --exclude ".godot" \
            ./ "$WORKSPACE/"

          rm -rf "$WORKSPACE/.godot"

      - name: Import project
        shell: bash
        env:
          HOME: /home/godot
        run: |
          set -euo pipefail
          "$GODOT" --headless --path "$WORKSPACE" --import --quit

      - name: Export web build
        shell: bash
        env:
          HOME: /home/godot
        run: |
          set -euo pipefail

          BUILD_ID="$(date +%s)-${GITHUB_SHA::7}"
          BUILD_DIR="$RELEASES/$BUILD_ID"

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

          "$GODOT" --headless \
            --path "$WORKSPACE" \
            --export-release Web \
            "$BUILD_DIR/index.html"

      - name: Remove Godot-generated manifest
        shell: bash
        run: |
          set -euo pipefail
          rm -f "$BUILD_DIR/index.manifest.json"

      - name: Copy CI-owned PWA assets
        shell: bash
        run: |
          set -euo pipefail

          cp "$WORKSPACE/icon_144x144.png" "$BUILD_DIR/icon_144x144.png"
          cp "$WORKSPACE/icon_180x180.png" "$BUILD_DIR/icon_180x180.png"
          cp "$WORKSPACE/icon_512x512.png" "$BUILD_DIR/icon_512x512.png"

          mkdir -p "$BUILD_DIR/screenshots"
          cp "$WORKSPACE/desktop.png" "$BUILD_DIR/screenshots/desktop.png"
          cp "$WORKSPACE/mobile.png" "$BUILD_DIR/screenshots/mobile.png"

      - name: Generate manifest
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
from pathlib import Path
import json
import os

build_dir = Path(os.environ["BUILD_DIR"])

manifest = {
    "id": "/index.html",
    "name": "doodleblob",
    "short_name": "doodleblob",
    "start_url": "/index.html",
    "scope": "/",
    "display": "standalone",
    "display_override": ["window-controls-overlay", "standalone"],
    "orientation": "any",
    "background_color": "#00b700",
    "theme_color": "#00b700",
    "icons": [
        {
            "src": "/icon_144x144.png",
            "sizes": "144x144",
            "type": "image/png"
        },
        {
            "src": "/icon_180x180.png",
            "sizes": "180x180",
            "type": "image/png"
        },
        {
            "src": "/icon_512x512.png",
            "sizes": "512x512",
            "type": "image/png"
        }
    ],
    "screenshots": [
        {
            "src": "/screenshots/desktop.png",
            "sizes": "1280x720",
            "type": "image/png",
            "form_factor": "wide"
        },
        {
            "src": "/screenshots/mobile.png",
            "sizes": "1080x1920",
            "type": "image/png"
        }
    ]
}

(build_dir / "manifest.webmanifest").write_text(
    json.dumps(manifest, indent=2) + "\n",
    encoding="utf-8"
)
PY

      - name: Generate robots.txt
        shell: bash
        run: |
          set -euo pipefail

          cat > "$BUILD_DIR/robots.txt" <<EOF
User-agent: *
Allow: /
EOF

      - name: Inject Lighthouse bootstrap layer
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
from pathlib import Path
import os
import re

path = Path(os.environ["BUILD_DIR"]) / "index.html"
html = path.read_text(encoding="utf-8")

# Replace any viewport meta with an accessibility-safe version.
html = re.sub(
    r'<meta name="viewport" content="[^"]*">',
    '<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">',
    html,
    count=1
)

# Remove any existing manifest link(s) so we own it fully.
html = re.sub(
    r'<link rel="manifest" href="[^"]*">\s*',
    '',
    html
)

# Remove any COI service worker script reference if present.
html = re.sub(
    r'<script src="coi-serviceworker\.js"></script>\s*',
    '',
    html
)

inject_head = """
<link rel="manifest" href="/manifest.webmanifest">
<link rel="canonical" href="https://game.fretu.stream/">

<meta name="theme-color" content="#00b700">
<meta name="description" content="doodleblob is a browser-based multiplayer sandbox game built with Godot.">
<meta name="keywords" content="godot, web game, multiplayer, sandbox, browser game">
<meta name="author" content="fretu.stream">

<meta property="og:type" content="website">
<meta property="og:title" content="doodleblob">
<meta property="og:description" content="Play doodleblob directly in your browser.">
<meta property="og:url" content="https://game.fretu.stream/">
<meta property="og:image" content="https://game.fretu.stream/icon_512x512.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="doodleblob">
<meta name="twitter:description" content="Play doodleblob directly in your browser.">
<meta name="twitter:image" content="https://game.fretu.stream/icon_512x512.png">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

#canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  touch-action: none;
}
</style>

<script>
/* Lighthouse Bootstrap Layer */

/* Fix canvas sizing */
window.addEventListener("load", () => {
  const c = document.getElementById("canvas");
  if (c) {
    c.style.width = "100vw";
    c.style.height = "100vh";
  }
});

/* Audio unlock */
(() => {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;

  let ctx = null;

  const unlock = async () => {
    try {
      if (!ctx) ctx = new AudioContext();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
    } catch (e) {}
    window.removeEventListener("click", unlock);
    window.removeEventListener("touchstart", unlock);
    window.removeEventListener("keydown", unlock);
  };

  window.addEventListener("click", unlock, { passive: true });
  window.addEventListener("touchstart", unlock, { passive: true });
  window.addEventListener("keydown", unlock, { passive: true });
})();
</script>
"""

html = html.replace("</head>", inject_head + "\n</head>")

path.write_text(html, encoding="utf-8")
PY

      - name: Validate output
        shell: bash
        run: |
          set -euo pipefail

          test -f "$BUILD_DIR/index.html"
          test -f "$BUILD_DIR/index.js"
          test -f "$BUILD_DIR/index.wasm"
          test -f "$BUILD_DIR/index.pck"
          test -f "$BUILD_DIR/manifest.webmanifest"
          test -f "$BUILD_DIR/icon_144x144.png"
          test -f "$BUILD_DIR/icon_180x180.png"
          test -f "$BUILD_DIR/icon_512x512.png"
          test -f "$BUILD_DIR/screenshots/desktop.png"
          test -f "$BUILD_DIR/screenshots/mobile.png"

          echo
          echo "Final build contents:"
          find "$BUILD_DIR" -maxdepth 2 -type f | sort

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          ln -sfn "$BUILD_DIR" "$CURRENT"

      - name: Cleanup old releases
        shell: bash
        run: |
          set -euo pipefail
          KEEP=10

          mapfile -t releases < <(
            find "$RELEASES" -mindepth 1 -maxdepth 1 -type d | sort -r
          )

          count=0
          for r in "${releases[@]}"; do
            count=$((count + 1))
            if [[ "$count" -gt "$KEEP" ]]; then
              rm -rf "$r"
            fi
          done

      - name: Show deployment
        shell: bash
        run: |
          echo "Build ID: $BUILD_ID"
          echo "Current: $(readlink -f "$CURRENT")"
