name: Deploy Godot Web

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: godot-web-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, godot, proxmox]

    env:
      GODOT: /usr/local/bin/godot
      WORKSPACE: /var/lib/godot/workspace
      RELEASES: /var/www/godot/releases
      CURRENT: /var/www/godot/current

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$WORKSPACE"
          mkdir -p "$WORKSPACE"
          rsync -a \
            --delete \
            --exclude ".git" \
            --exclude ".godot" \
            ./ "$WORKSPACE/"
          rm -rf "$WORKSPACE/.godot"

      - name: Import project
        shell: bash
        env:
          HOME: /home/godot
        run: |
          set -euo pipefail
          "$GODOT" --headless --path "$WORKSPACE" --import --quit

      - name: Export web build
        shell: bash
        env:
          HOME: /home/godot
        run: |
          set -euo pipefail

          BUILD_ID="$(date +%s)-${GITHUB_SHA::7}"
          BUILD_DIR="$RELEASES/$BUILD_ID"

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

          "$GODOT" --headless \
            --path "$WORKSPACE" \
            --export-release Web \
            "$BUILD_DIR/index.html"

      - name: Normalize Godot output (critical fix)
        shell: bash
        run: |
          set -euo pipefail

          # remove Godot manifest (we own PWA now)
          rm -f "$BUILD_DIR/index.manifest.json"

          # ensure clean naming stability
          for f in "$BUILD_DIR"/icon_* "$BUILD_DIR"/index.*; do
            [ -e "$f" ] || true
          done

      - name: Copy CI-owned PWA assets
        shell: bash
        run: |
          set -euo pipefail

          cp "$WORKSPACE/icon_144x144.png" "$BUILD_DIR/icon_144x144.png"
          cp "$WORKSPACE/icon_180x180.png" "$BUILD_DIR/icon_180x180.png"
          cp "$WORKSPACE/icon_512x512.png" "$BUILD_DIR/icon_512x512.png"

          mkdir -p "$BUILD_DIR/screenshots"
          cp "$WORKSPACE/desktop.png" "$BUILD_DIR/screenshots/desktop.png"
          cp "$WORKSPACE/mobile.png" "$BUILD_DIR/screenshots/mobile.png"

      # ---------------------------
      # PWA MANIFEST (CI OWNED)
      # ---------------------------
      - name: Generate manifest
        shell: bash
        run: |
          set -euo pipefail

          cat > "$BUILD_DIR/manifest.webmanifest" <<'EOF'
{
  "id": "/index.html",
  "name": "doodleblob",
  "short_name": "doodleblob",
  "start_url": "/index.html",
  "scope": "/",
  "display": "standalone",
  "display_override": ["standalone"],
  "orientation": "any",
  "background_color": "#00b700",
  "theme_color": "#00b700",
  "icons": [
    { "src": "/icon_144x144.png", "sizes": "144x144", "type": "image/png" },
    { "src": "/icon_180x180.png", "sizes": "180x180", "type": "image/png" },
    { "src": "/icon_512x512.png", "sizes": "512x512", "type": "image/png" }
  ],
  "screenshots": [
    {
      "src": "/screenshots/desktop.png",
      "sizes": "1280x720",
      "type": "image/png",
      "form_factor": "wide"
    },
    {
      "src": "/screenshots/mobile.png",
      "sizes": "1080x1920",
      "type": "image/png"
    }
  ]
}
EOF

      - name: Generate robots.txt
        shell: bash
        run: |
          set -euo pipefail
          cat > "$BUILD_DIR/robots.txt" <<'EOF'
User-agent: *
Allow: /
EOF

      # ---------------------------
      # LIGHTHOUSE-FIRST BOOTSTRAP
      # ---------------------------
      - name: Inject Lighthouse bootstrap layer
        shell: bash
        run: |
          set -euo pipefail

          python3 - "$BUILD_DIR/index.html" <<'PY'
from pathlib import Path
import sys

p = Path(sys.argv[1])
html = p.read_text(encoding="utf-8")

bootstrap = """
<script>
/* ---- Lighthouse Bootstrap Layer ---- */

/* Canvas fix */
document.addEventListener("DOMContentLoaded", () => {
  const c = document.getElementById("canvas");
  if (c) {
    c.style.width = "100vw";
    c.style.height = "100vh";
  }
});

/* Audio unlock (no autoplay penalty loop spam) */
(function () {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;

  const ctx = new AudioContext();

  const unlock = async () => {
    try { await ctx.resume(); } catch (e) {}
  };

  ["click","touchstart","keydown"].forEach(evt =>
    window.addEventListener(evt, unlock, { once: true, passive: true })
  );
})();
</script>
"""

if "<meta name=\"viewport\"" in html:
    html = html.replace(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">',
        '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
    )

html = html.replace("</head>", bootstrap + "\n</head>")

p.write_text(html, encoding="utf-8")
PY

      # ---------------------------
      # VALIDATION
      # ---------------------------
      - name: Validate output
        shell: bash
        run: |
          set -euo pipefail
          test -f "$BUILD_DIR/index.html"
          test -f "$BUILD_DIR/index.js"
          test -f "$BUILD_DIR/index.wasm"
          test -f "$BUILD_DIR/index.pck"
          test -f "$BUILD_DIR/manifest.webmanifest"

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          ln -sfn "$BUILD_DIR" "$CURRENT"

      - name: Cleanup old releases
        shell: bash
        run: |
          set -euo pipefail
          KEEP=10
          mapfile -t releases < <(find "$RELEASES" -mindepth 1 -maxdepth 1 -type d | sort -r)

          count=0
          for r in "${releases[@]}"; do
            count=$((count + 1))
            if [[ "$count" -gt "$KEEP" ]]; then
              rm -rf "$r"
            fi
          done

      - name: Show deployment
        shell: bash
        run: |
          echo "Build: $BUILD_ID"
          echo "Current: $(readlink -f "$CURRENT")"
